app:
  name: TradeChat
  default_horizon_days: 1
  artifact_dir: artifacts
  data_cache_dir: data/cache
batch:
  train_workers: 1
simulation:
  mode: replay
  rebalance_days: 5
  warmup_bars: 150
  allow_short: false
  costs:
    fee_mode: order_percent
    fee_amount: 0.03
    slippage_pct: 0.02
  execution:
    native_stop_loss: true
    native_take_profit: true
    native_trailing: true
    native_hold_bars: true
    max_position_pct: 40.0
features_file: features.yaml
data:
  period: max
  min_rows: 150
  macro_tickers:
  - ^BVSP
  - USDBRL=X
  - BZ=F
  registry_file: data.yaml
model:
  random_state: 42
  test_size: 0.2
  engines:
    xgb:
      enabled: true
      n_estimators: 140
      max_depth: 3
      learning_rate: 0.05
      subsample: 0.9
    catboost:
      enabled: true
      iterations: 220
      depth: 4
      learning_rate: 0.04
      loss_function: MAE
    extratrees:
      enabled: true
      n_estimators: 260
      max_depth: 10
      min_samples_leaf: 2
  arbiter:
    ridge:
      enabled: true
      alpha: 1.0
  stacking:
    cv: 4
    note: Time-series out-of-fold folds used to train the Ridge arbiter.
  validation:
    embargo_by_horizon: true
    embargo_bars: auto
    min_train_rows: 90
    evaluate_on_raw_target: true
    note: Feature selection and autotune use train-only temporal splits with horizon embargo.
  confidence:
    agreement_scale_return: 0.010
    mae_reference_return: 0.012
    action_scale_return: 0.0045
    neutral_prediction_component_floor: 0.30
    discarded_engine_penalty: 0.75
    sample_reference_rows: 1000
    minimum_when_engines_exist: 0.03
    maximum_confidence: 0.88
  prediction_guards:
    max_engine_return_abs: 0.12
    max_final_return_abs: 0.08
  autotune:
    enabled_by_default: false
    n_iter: 15
    cv: 3
    scoring: neg_mean_absolute_error
    spaces:
      xgb:
        n_estimators: [60, 300]
        max_depth: [2, 9]
        learning_rate: [0.005, 0.2]
        subsample: [0.7, 1.0]
        colsample_bytree: [0.7, 1.0]
      catboost:
        iterations: [80, 400]
        depth: [2, 10]
        learning_rate: [0.005, 0.2]
        l2_leaf_reg: [1, 9]
      extratrees:
        n_estimators: [100, 500]
        max_depth: [3, 25]
        min_samples_leaf: [1, 15]
        max_features: ["sqrt", "log2", null]
  engine_safety:
    consensus_guard_enabled: true
    max_deviation_from_median: 0.025
    note: Protects Ridge arbitration from a single divergent tabular engine.
policy:
  buy_return_pct: 0.20
  sell_return_pct: -0.20
  strong_buy_return_pct: 1.5
  strong_sell_return_pct: -1.5
  min_confidence_pct: 0.45
  mae_threshold_multiplier: 0.25
  risk_management:
    aggressive_multiplier: 1.2
    selective_multiplier: 1.8
    min_rr_threshold: 1.5
  high_confidence_pct: 0.7
  max_risk_pct_for_buy: 4.0
  use_fundamentals_as_filter: true
  max_pl_for_strong_buy: 18.0
  min_roe_for_strong_buy: 0.08
  min_sentiment_for_strong_buy: 0.1
  max_sentiment_for_strong_sell: -0.1
ui:
  color: true
  show_charts: false

trading:
  capital: 10000.0
  allow_short: false
  risk_per_trade_pct: 1.0  # Accept losing 1% of total capital (R$ 100) if stopped
  partial_take_profit_pct: 50.0 # Sell 50% at Target 1
  trade_management:
    partial_take_profit_pct: 50.0
    breakeven_after_partial: true
    trailing_stop_enabled: true
    trailing_distance_risk_multiple: 0.75
    max_hold_days:
      d1: 3
      d5: 10
      d20: 30
