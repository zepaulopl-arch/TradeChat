app:
  name: TradeGem
  default_horizon_days: 1
  artifact_dir: artifacts
  data_cache_dir: data_cache
features_file: features.yaml
data:
  period: max
  min_rows: 220
  macro_tickers:
  - ^BVSP
  - USDBRL=X
  - BZ=F
  registry_file: data.yaml
model:
  random_state: 42
  test_size: 0.2
  engines:
    xgb:
      enabled: true
      n_estimators: 120
      max_depth: 3
      learning_rate: 0.05
      subsample: 0.9
    rf:
      enabled: true
      n_estimators: 220
      max_depth: 8
    mlp:
      enabled: true
      hidden_layer_sizes:
      - 64
      - 32
      alpha: 0.0005
      learning_rate_init: 0.001
      max_iter: 600
      early_stopping: true
  arbiter:
    ridge:
      enabled: true
      alpha: 1.0
  confidence:
    agreement_scale_return: 0.01
    minimum_when_engines_exist: 0.05
  prediction_guards:
    max_engine_return_abs: 0.12
    max_final_return_abs: 0.08
  autotune:
    enabled_by_default: false
    n_iter: 5
    cv: 2
    scoring: neg_mean_absolute_error
    spaces:
      xgb:
        n_estimators:
        - 50
        - 150
        max_depth:
        - 3
        - 7
      rf:
        n_estimators:
        - 50
        - 150
        max_depth:
        - 5
        - 10
      mlp:
        hidden_layer_sizes:
        - 32
        - 64
        alpha:
        - 0.0001
        - 0.01
policy:
  strong_buy_return_pct: 1.5
  buy_return_pct: 0.45
  sell_return_pct: -0.45
  strong_sell_return_pct: -1.5
  min_confidence_pct: 0.55
  high_confidence_pct: 0.7
  max_risk_pct_for_buy: 4.0
  use_fundamentals_as_filter: true
  max_pl_for_strong_buy: 18.0
  min_roe_for_strong_buy: 0.08
  min_sentiment_for_strong_buy: 0.1
  max_sentiment_for_strong_sell: -0.1
daily:
  generate_report: false
ui:
  color: true
  show_charts: false
