version: 1
description: 'Operational asset registry: metadata for market context, CVM/fundamentals
  lookup and future sector/index expansion. Keep this file cadastral; keep model parameters
  in config.yaml.'
sources:
  b3_companies_listed: B3 Empresas Listadas
  b3_sector_classification: B3 Classificacao Setorial
  cvm: CVM demonstracoes financeiras
  market_prices: Yahoo Finance tickers used by yfinance
indices:
  default_context:
  - ^BVSP
  - USDBRL=X
  - BZ=F
  available_now:
    ^BVSP:
      label: Ibovespa
      role: benchmark_market
      provider: yfinance
    USDBRL=X:
      label: USD/BRL
      role: fx
      provider: yfinance
    BZ=F:
      label: Brent crude oil futures
      role: commodity_oil
      provider: yfinance
  future_candidates:
    IFNC:
      label: Indice Financeiro
      role: sector_financials
      provider: b3/yfinance_if_available
    IMAT:
      label: Indice Materiais Basicos
      role: sector_materials
      provider: b3/yfinance_if_available
    IEEX:
      label: Indice Energia Eletrica
      role: sector_utilities
      provider: b3/yfinance_if_available
    ICON:
      label: Indice Consumo
      role: sector_consumption
      provider: b3/yfinance_if_available
    INDX:
      label: Indice Industrial
      role: sector_industrials
      provider: b3/yfinance_if_available
    IMOB:
      label: Indice Imobiliario
      role: sector_real_estate
      provider: b3/yfinance_if_available
    SMLL:
      label: Indice Small Cap
      role: style_small_caps
      provider: b3/yfinance_if_available
    IBRX50:
      label: IBrX 50
      role: large_caps
      provider: b3/yfinance_if_available
