version: 1
description: 'Operational asset registry: metadata for market context, CVM/fundamentals lookup and future sector/index expansion.
  Keep this file cadastral; keep model parameters in config.yaml.'
sources:
  b3_companies_listed: B3 Empresas Listadas
  b3_sector_classification: B3 Classificacao Setorial
  cvm: CVM demonstracoes financeiras
  market_prices: Yahoo Finance tickers used by yfinance
indices:
  default_context:
  - IBOV
  - USDBRL
  - BRENT
  available_now: &id007
    IBOV:
      label: Ibovespa
      role: benchmark_market
      provider: yfinance
      yahoo_ticker: ^BVSP
      enabled: true
    USDBRL:
      label: USD/BRL
      role: fx
      provider: yfinance
      yahoo_ticker: USDBRL=X
      enabled: true
    BRENT:
      label: Brent crude oil futures
      role: commodity_oil
      provider: yfinance
      yahoo_ticker: BZ=F
      enabled: true
    IFNC:
      label: Indice Financeiro B3
      role: sector_financials
      provider: yfinance
      yahoo_ticker: IFNC.SA
      enabled: true
    IEEX:
      label: Indice de Energia Eletrica B3
      role: sector_utilities
      provider: yfinance
      yahoo_ticker: ^IEE
      enabled: true
    IBRX50:
      label: IBrX 50 B3
      role: large_caps
      provider: yfinance
      yahoo_ticker: ^IBX50
      enabled: true
    IMAT: &id001
      label: Indice Materiais Basicos B3
      role: sector_materials
      provider: future
      yahoo_ticker: null
      enabled: false
    ICON: &id002
      label: Indice Consumo B3
      role: sector_consumption
      provider: future
      yahoo_ticker: null
      enabled: false
    INDX: &id003
      label: Indice Industrial B3
      role: sector_industrials
      provider: future
      yahoo_ticker: null
      enabled: false
    IMOB: &id004
      label: Indice Imobiliario B3
      role: sector_real_estate
      provider: future
      yahoo_ticker: null
      enabled: false
    SMLL: &id005
      label: Indice Small Cap B3
      role: style_small_caps
      provider: future
      yahoo_ticker: null
      enabled: false
    IDIV: &id006
      label: Indice Dividendos B3
      role: style_dividends
      provider: future_b3_or_yfinance
      yahoo_ticker: null
      enabled: false
      validation_status: pending_provider_validation
    UTIL:
      label: Utilities proxy via IEEX
      role: sector_utilities
      provider: derived
      yahoo_ticker: null
      enabled: false
      validation_status: use_IEEX_until_direct_provider
  future_candidates:
    IMAT: *id001
    ICON: *id002
    INDX: *id003
    IMOB: *id004
    SMLL: *id005
    IDIV: *id006
  catalog: *id007
