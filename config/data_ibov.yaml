version: 1
description: IBOV operational asset registry generated from the attached B3 daily Ibovespa composition file. This file is
  intentionally saved as data_ibov.yaml and does not replace config/data.yaml. Enriched with researched sector/CNPJ metadata
  for all IBOV components.
sources:
  b3_companies_listed: B3 Empresas Listadas
  b3_sector_classification: B3 Classificacao Setorial
  cvm: CVM demonstracoes financeiras
  market_prices: Yahoo Finance tickers used by yfinance
  b3_ibov_daily_file: IBOVDia_11-05-26.csv
  cvm_cad_cia_aberta: https://dados.cvm.gov.br/dados/CIA_ABERTA/CAD/DADOS/cad_cia_aberta.csv
  b3_listed_companies_pages: B3 Empresas Listadas / Códigos de Negociação pages consulted for CNPJ, activity and CVM codes
  b3_sector_classification_pages: B3/listed-company and market-data pages consulted for sector/subsector/segment validation
  ri_company_pages: Company investor-relations pages used as secondary validation when available
indices:
  default_context:
  - IBOV
  - USDBRL
  - BRENT
