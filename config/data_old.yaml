      provider: future
      yahoo_ticker: null
      enabled: false
    SMLL: &id005
      label: Indice Small Cap B3
      role: style_small_caps
      provider: future
      yahoo_ticker: null
      enabled: false
    IDIV: &id006
      label: Indice Dividendos B3
      role: style_dividends
      provider: future_b3_or_yfinance
      yahoo_ticker: null
      enabled: false
      validation_status: pending_provider_validation
    UTIL:
      label: Utilities proxy via IEEX
      role: sector_utilities
      provider: derived
      yahoo_ticker: null
      enabled: false
