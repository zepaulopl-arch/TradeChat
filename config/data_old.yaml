version: 1
description: 'Operational asset registry: metadata for market context, CVM/fundamentals lookup and future
  sector/index expansion. Keep this file cadastral; keep model parameters in config.yaml.'
sources:
  b3_companies_listed: B3 Empresas Listadas
  b3_sector_classification: B3 Classificacao Setorial
  cvm: CVM demonstracoes financeiras
  market_prices: Yahoo Finance tickers used by yfinance
indices:
  default_context:
  - IBOV
  - USDBRL
  - BRENT
  available_now: &id007
    IBOV:
      label: Ibovespa
      role: benchmark_market
      provider: yfinance
      yahoo_ticker: ^BVSP
      enabled: true
    USDBRL:
      label: USD/BRL
      role: fx
      provider: yfinance
      yahoo_ticker: USDBRL=X
      enabled: true
    BRENT:
      label: Brent crude oil futures
      role: commodity_oil
      provider: yfinance
      yahoo_ticker: BZ=F
      enabled: true
    IFNC:
      label: Indice Financeiro B3
      role: sector_financials
      provider: yfinance
      yahoo_ticker: IFNC.SA
      enabled: true
