      label: IBrX 50 B3
      role: large_caps
      provider: yfinance
      yahoo_ticker: ^IBX50
      enabled: true
    IMAT: &id001
      label: Indice Materiais Basicos B3
      role: sector_materials
      provider: future
      yahoo_ticker: null
      enabled: false
    ICON: &id002
