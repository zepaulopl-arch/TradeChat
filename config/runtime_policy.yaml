promotion:

  mode: by-asset

  metric: profit_factor

  constraints:

    max_drawdown_pct: 15.0

    min_trades: 15

    min_sharpe: 0.80

    max_exposure_pct: 80.0

  fallback_profile: active

  tie_break:

    - hit_pct
    - avg_trade_pct
    - drawdown_pct

  runtime_decision_guard:

    enabled: true

    decisions:

      REJECT:

        max_signal: NEUTRAL

        posture: wait_matrix_reject

        reason: "signal blocked: Matrix decision is REJECT"

      INCONCLUSIVE:

        max_signal: NEUTRAL

        posture: wait_matrix_inconclusive

        reason: "signal blocked: Matrix decision is INCONCLUSIVE"

      OBSERVE:

        max_signal: NEUTRAL

        posture: wait_matrix_observe

        reason: "signal blocked: Matrix decision is OBSERVE"

      APPROVE:

        max_signal: ACTIONABLE

  asset_specific_active:

    bounds:

      min_buy_return_pct: 0.04

      max_buy_return_pct: 0.30

      default_buy_return_pct: 0.08

      min_confidence_pct_floor: 0.32

      min_confidence_pct_cap: 0.45

      min_rr_floor: 0.10

      min_rr_cap: 0.60

      risk_per_trade_pct_floor: 0.25

      risk_per_trade_pct_cap: 1.0

      max_position_pct_floor: 5.0

      max_position_pct_cap: 40.0

  runtime_overrides:

    enabled: true

    profiles:

      active:

        buy_return_pct: 0.08

        sell_return_pct: -0.08

        min_confidence_pct: 0.35

        mae_threshold_multiplier: 0.08

        risk_management:

          min_rr_threshold: 0.15
